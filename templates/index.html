<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社員管理システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #1a56db;
      color: #fff;
      padding: 16px 32px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    main {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h2 {
      font-size: 1rem;
      font-weight: 600;
    }

    .badge {
      background: #e0e7ff;
      color: #3730a3;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 9999px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #f9fafb;
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid #e5e7eb;
    }

    td {
      padding: 14px 16px;
      font-size: 0.9rem;
      border-bottom: 1px solid #f0f2f5;
      white-space: nowrap;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #f5f7ff;
    }

    .emp-id {
      font-family: monospace;
      color: #6b7280;
      font-size: 0.85rem;
    }

    .dept-tag {
      display: inline-block;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
      font-size: 0.78rem;
      padding: 2px 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>社員管理システム</h1>
  </header>

  <main>
    <div class="card">
      <div class="card-header">
        <h2>社員一覧</h2>
        <span class="badge">{{ employees | length }} 件</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>社員番号</th>
            <th>氏名</th>
            <th>部署</th>
            <th>役職</th>
            <th>入社日</th>
          </tr>
        </thead>
        <tbody>
          {% for emp in employees %}
          <tr>
            <td class="emp-id">{{ emp.社員番号 }}</td>
            <td>{{ emp.氏名 }}</td>
            <td><span class="dept-tag">{{ emp.部署 }}</span></td>
            <td>{{ emp.役職 }}</td>
            <td>{{ emp.入社日 }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
