{% extends "base.html" %}
{% block title %}勤怠編集 — 社員管理システム{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h2>勤怠編集</h2>
  </div>
  <div class="card-body">
    <form method="post">
      <div class="form-group">
        <label for="employee_id">社員</label>
        <select id="employee_id" name="employee_id" required>
          <option value="">— 選択してください —</option>
          {% for emp in employees %}
          <option value="{{ emp.id }}"
            {% if record.employee_id == emp.id %}selected{% endif %}>
            {{ emp.employee_id }} {{ emp.name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="work_date">勤務日</label>
        <input type="date" id="work_date" name="work_date"
               required value="{{ record.work_date }}">
      </div>
      <div class="form-group">
        <label for="clock_in">出勤時刻</label>
        <input type="time" id="clock_in" name="clock_in" required
               value="{{ record.clock_in.strftime('%H:%M') if record.clock_in else '' }}">
      </div>
      <div class="form-group">
        <label for="clock_out">退勤時刻</label>
        <input type="time" id="clock_out" name="clock_out"
               value="{{ record.clock_out.strftime('%H:%M') if record.clock_out else '' }}">
        <p class="hint">退勤前の場合は空欄のままにしてください</p>
      </div>
      <div class="form-group">
        <label for="note">メモ</label>
        <input type="text" id="note" name="note" maxlength="200"
               value="{{ record.note or '' }}">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">更新する</button>
        <a href="{{ url_for('attendance.index') }}" class="btn btn-secondary">キャンセル</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
